name: 🛡️ Supply Chain Risk Scanner

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Périmètre"
        required: true
        type: choice
        options: [all-my-repos, public-only, this-repo-only]
        default: all-my-repos
      include_archived:
        type: boolean
        default: false
      include_forks:
        type: boolean
        default: false
      ecosystems:
        description: "csv: npm,pypi,composer,cargo,ruby,dotnet,maven,gradle,actions,docker — ou 'all'"
        required: false
        default: 'all'
      commit_report:
        description: "Committer le rapport dans le repo"
        type: boolean
        default: true
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: supply-chain-scan
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1) DISCOVER — liste les repos + horodatage partagé
  # ─────────────────────────────────────────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
      ecosystems: ${{ steps.list.outputs.ecosystems }}
      date: ${{ steps.meta.outputs.date }}
      time: ${{ steps.meta.outputs.time }}
      filename: ${{ steps.meta.outputs.filename }}
      reldir: ${{ steps.meta.outputs.reldir }}
    steps:
      - uses: actions/checkout@v6

      - id: meta
        name: 📅 Horodatage du run
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TIME=$(date -u +%H%M%S)
          RELDIR="reports/supply-chain/${DATE}"
          {
            echo "date=$DATE"
            echo "time=$TIME"
            echo "reldir=$RELDIR"
            echo "filename=${RELDIR}/${DATE}_${TIME}-utc.md"
          } >> "$GITHUB_OUTPUT"

      - id: list
        name: 🔎 Lister les repos & écosystèmes
        uses: actions/github-script@v9
        env:
          SCOPE: ${{ inputs.scope || 'all-my-repos' }}
          INCLUDE_ARCHIVED: ${{ inputs.include_archived || 'false' }}
          INCLUDE_FORKS: ${{ inputs.include_forks || 'false' }}
          ECOSYSTEMS: ${{ inputs.ecosystems || 'all' }}
        with:
          github-token: ${{ secrets.SUPPLY_CHAIN_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const { listRepos, getEnabledEcosystems } =
              require('./.github/scripts/supply-chain-scanner.js');
            const repos = await listRepos({
              github, context,
              scope: process.env.SCOPE,
              includeArchived: process.env.INCLUDE_ARCHIVED === 'true',
              includeForks: process.env.INCLUDE_FORKS === 'true',
            });
            const ecos = getEnabledEcosystems(process.env.ECOSYSTEMS);
            core.info(`Repos: ${repos.length} | Écosystèmes: ${ecos.join(', ')}`);
            core.setOutput('repos', JSON.stringify(repos));
            core.setOutput('ecosystems', JSON.stringify(ecos));

  # ─────────────────────────────────────────────────────────────
  # 2) SCAN — un job parallèle par écosystème
  # ─────────────────────────────────────────────────────────────
  scan:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        ecosystem: ${{ fromJSON(needs.discover.outputs.ecosystems) }}
    steps:
      - uses: actions/checkout@v6

      - name: 🔬 Scanner ${{ matrix.ecosystem }}
        uses: actions/github-script@v9
        env:
          ECO: ${{ matrix.ecosystem }}
          REPOS_JSON: ${{ needs.discover.outputs.repos }}
        with:
          github-token: ${{ secrets.SUPPLY_CHAIN_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { scanEcosystem } =
              require('./.github/scripts/supply-chain-scanner.js');
            const repos = JSON.parse(process.env.REPOS_JSON);
            const result = await scanEcosystem({
              github, core, ecosystemKey: process.env.ECO, repos,
            });
            fs.writeFileSync('result.json', JSON.stringify(result, null, 2));
            core.info(`Findings: ${result.results.reduce((s,r)=>s+r.findings.length,0)} sur ${result.results.length} repos`);

      - uses: actions/upload-artifact@v7
        with:
          name: scan-${{ matrix.ecosystem }}
          path: result.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 3) REPORT — agrège, génère le markdown, commit dans le repo
  # ─────────────────────────────────────────────────────────────
  report:
    needs: [discover, scan]
    runs-on: ubuntu-latest
    if: always() && needs.discover.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: scan-*

      - name: 📝 Générer le rapport
        uses: actions/github-script@v9
        env:
          DATE: ${{ needs.discover.outputs.date }}
          TIME: ${{ needs.discover.outputs.time }}
          FILENAME: ${{ needs.discover.outputs.filename }}
          RELDIR: ${{ needs.discover.outputs.reldir }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { buildReport } =
              require('./.github/scripts/supply-chain-scanner.js');

            const all = {};
            const dir = 'artifacts';
            if (fs.existsSync(dir)) {
              for (const entry of fs.readdirSync(dir)) {
                const file = path.join(dir, entry, 'result.json');
                if (!fs.existsSync(file)) continue;
                const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                all[data.ecosystem] = data;
              }
            }

            const md = buildReport(all, {
              date: process.env.DATE,
              time: process.env.TIME,
              runUrl: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

            fs.mkdirSync(process.env.RELDIR, { recursive: true });
            fs.writeFileSync(process.env.FILENAME, md);
            fs.writeFileSync('reports/supply-chain/latest.md', md);

            await core.summary.addRaw(md).write();
            core.notice(`📄 Rapport: ${process.env.FILENAME}`);

      - uses: actions/upload-artifact@v7
        with:
          name: report-${{ needs.discover.outputs.date }}-${{ needs.discover.outputs.time }}
          path: reports/supply-chain/
          retention-days: 90

      - name: 💾 Commit du rapport
        if: ${{ inputs.commit_report != false }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/supply-chain/
          if git diff --cached --quiet; then
            echo "Aucun changement à committer."
            exit 0
          fi
          git commit -m "📊 Supply-chain report ${{ needs.discover.outputs.date }} ${{ needs.discover.outputs.time }} UTC [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            sleep $((i*3))
          done
          exit 1
